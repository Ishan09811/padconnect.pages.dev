<style>
body {
    margin: 0;

    filter: drop-shadow(0 0 20px rgba(120, 160, 255, 0.3));
}

}

    color: #9aa4b2;
    font-size: 18px;
    margin-bottom: 30px;
}

.button {
    display: inline-block;
    padding: 12px 24px;
    border-radius: 12px;
    background: linear-gradient(135deg, #5f8cff, #7aa2ff);
    color: white;

<script>
async function setupReleaseInfo() {
    const btn = document.getElementById("downloadBtn");
    const versionEl = document.getElementById("version");
    const notesEl = document.getElementById("releaseNotes");

    btn.innerText = "Loading...";

    try {
        const res = await fetch(
            "https://api.github.com/repos/Ishan09811/PadConnect/releases/latest"
        );

        const data = await res.json();
        versionEl.innerText = "Latest Version: " + data.tag_name;
        notesEl.innerText = data.body || "No release notes provided.";
        const asset = data.assets.find(a => a.name.endsWith(".apk")) || data.assets[0];

        if (asset) {
            btn.innerText = "Download " + data.tag_name;

            btn.onclick = () => {
                window.location.href = asset.browser_download_url;
            };
        } else {
            btn.innerText = "No Download Available";
        }

    } catch (err) {
        console.error(err);
        btn.innerText = "Failed to load";
        notesEl.innerText = "Could not fetch release info.";
    }
}

setupReleaseInfo();
</script>
